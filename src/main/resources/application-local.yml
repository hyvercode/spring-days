spring:
  profiles: local
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/spring-days
    username: postgres
    password: root

    jpa:
      hibernate:
        ddl-auto: none
      show-sql: true
      pen-in-view: false
      generate-ddl: true
      database: postgresql
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      defer-datasource-initialization: true

    # Logger configuration
    logging:
      level:
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql: TRACE
        org.springframework: INFO

    flyway:
      locations: classpath:db/migration
      url: jdbc:postgresql://localhost:5432/spring-days
      username: postgres
      password: root

server:
  port: 8888

spring-doc:
  version: '3.0'
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

